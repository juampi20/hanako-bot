# ──────────────────────────────────────────────────────────
# Producción: usá esto en el cloud provider (Fly.io,
# Railway, etc.) O usalo localmente apuntando a una DB
# externa con DATABASE_URL en .env.production.
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#
# O mergealo con el compose base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────

services:
  bot:
    build: .
    image: ghcr.io/chester/hanako-bot:latest
    container_name: hanako-bot
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prod-net

networks:
  prod-net:
    driver: bridge

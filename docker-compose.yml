services:
  bot:
    build: .
    container_name: hanako-bot
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra-red

networks:
  infra-red:
    external: true
